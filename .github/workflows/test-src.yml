name: Test src.py

on: 
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies (если нужны)
        run: |
          pip install pytest  # или другие библиотеки
          
      - name: Run src.py
        run: python src.py
